{% extends 'base.html' %}

{% block title %}Удалить запись{% endblock %}

{% block content %}
<div class="d-flex">
    {% include 'catalog/menu.html' %}

    <main class="container-fluid p-5">
        <h1>Удалить запись "{{ post.title }}"?</h1>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'blog:list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </main>
</div>
{% endblock %}
