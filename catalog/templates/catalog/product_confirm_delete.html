{% extends 'base.html' %}

{% block title %}Удалить товар{% endblock %}

{% block content %}
<h1>Удалить товар "{{ product.name }}"?</h1>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'catalog:product_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
