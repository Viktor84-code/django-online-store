<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой магазин{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; width: 300px; }
        .card img { max-width: 100%; height: auto; }
        nav { background: #333; color: white; padding: 10px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; }
    </style>
</head>
<body>
    {% include 'includes/menu.html' %}

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer style="text-align: center; margin-top: 50px; padding: 20px; background: #f4f4f4;">
        <p>&copy; 2026 Мой магазин</p>
    </footer>
</body>
</html>
